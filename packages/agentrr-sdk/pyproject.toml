[project]
name = "agentrr-sdk"
version = "0.1.0a1"
requires-python = ">=3.11"
dependencies = [
    "agentrr-core",
    "agentrr-recorder",
    "agentrr-replay",
    "openai>=1.0",
    "anthropic>=0.40",
    "structlog>=24.0",
]

[tool.uv.sources]
agentrr-core = { workspace = true }
agentrr-recorder = { workspace = true }
agentrr-replay = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentrr_sdk"]
