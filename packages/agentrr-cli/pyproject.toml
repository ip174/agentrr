[project]
name = "agentrr-cli"
version = "0.1.0a1"
requires-python = ">=3.11"
dependencies = [
    "agentrr-core",
    "agentrr-sdk",
    "agentrr-replay",
    "typer>=0.12",
    "rich>=13.0",
]

[project.scripts]
agentrr = "agentrr_cli.app:app"

[tool.uv.sources]
agentrr-core = { workspace = true }
agentrr-sdk = { workspace = true }
agentrr-replay = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentrr_cli"]
